<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Countdown - Comentários e Fotos</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 900px; width: 100%; }

        /* Formulário de Criação */
        .creator-box {
            background: var(--card-bg);
            padding: 25px; border-radius: 16px;
            margin-bottom: 40px; border: 1px solid #334155;
            display: flex; flex-direction: column; gap: 12px;
        }

        input {
            padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: white; font-size: 14px;
        }

        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }

        .btn-post {
            background: var(--primary); color: #000; font-weight: bold;
            padding: 15px; border: none; border-radius: 8px; cursor: pointer;
        }

        /* Feed */
        .feed-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px;
        }

        .card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            display: flex; flex-direction: column; position: relative;
            border: 1px solid #334155; transition: transform 0.2s;
        }

        .card-image {
            height: 180px; background-size: cover; background-position: center;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        .card-image::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
        }

        .timer-val {
            position: relative; z-index: 2; font-size: 28px; font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .card-body { padding: 15px; flex-grow: 1; }
        .card-body h3 { margin: 0 0 10px 0; font-size: 18px; }

        /* Seção de Comentários */
        .comment-section {
            background: #0f172a; padding: 10px; border-top: 1px solid #334155;
            max-height: 150px; overflow-y: auto;
        }

        .comment-list { margin-bottom: 10px; font-size: 13px; }
        .comment-item { 
            background: #1e293b; padding: 5px 10px; border-radius: 6px; 
            margin-bottom: 5px; border-left: 3px solid var(--primary);
        }

        .comment-input-area { display: flex; gap: 5px; padding: 10px; border-top: 1px solid #334155; }
        .comment-input-area input { flex: 1; padding: 8px; font-size: 12px; }
        .comment-input-area button { background: #334155; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 0 10px; }

        .actions { display: flex; justify-content: space-between; padding: 10px; background: #1e293b; }
        .btn-small { font-size: 12px; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; }
        .btn-del { background: #ef4444; color: white; }
        .btn-down { background: #10b981; color: white; }

    </style>
</head>
<body>

    <div class="container">
        <div class="creator-box">
            <h2 style="margin:0">🚀 Nova Postagem</h2>
            <input type="text" id="title" placeholder="Título da Contagem">
            <input type="text" id="img" placeholder="URL da Imagem de fundo">
            <div class="row">
                <input type="datetime-local" id="date">
                <input type="color" id="color" value="#38bdf8" style="width: 50px; padding: 2px;">
            </div>
            <button class="btn-post" onclick="post()">POSTAR AGORA</button>
        </div>

        <div class="feed-grid" id="feed"></div>
    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('posts_v3')) || [];

        function save() { localStorage.setItem('posts_v3', JSON.stringify(posts)); render(); }

        function post() {
            const title = document.getElementById('title').value;
            const img = document.getElementById('img').value || 'https://images.unsplash.com/photo-1467810563316-b5476525c0f9?q=80';
            const date = document.getElementById('date').value;
            const color = document.getElementById('color').value;

            if(!title || !date) return alert("Preencha título e data!");

            posts.unshift({
                id: Date.now(),
                title, img, color,
                target: new Date(date).getTime(),
                comments: []
            });
            save();
        }

        function addComment(id) {
            const input = document.getElementById(`in-${id}`);
            if(!input.value) return;
            
            const postIndex = posts.findIndex(p => p.id === id);
            posts[postIndex].comments.push(input.value);
            input.value = '';
            save();
        }

        function deletePost(id) {
            if(confirm("Excluir contagem?")) {
                posts = posts.filter(p => p.id !== id);
                save();
            }
        }

        function render() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${p.img}')">
                        <div class="timer-val" id="t-${p.id}" style="color: ${p.color}">00:00:00</div>
                    </div>
                    <div class="card-body">
                        <h3>${p.title}</h3>
                    </div>
                    
                    <div class="comment-section">
                        <div class="comment-list">
                            ${p.comments.map(c => `<div class="comment-item">${c}</div>`).join('')}
                        </div>
                    </div>
                    
                    <div class="comment-input-area">
                        <input type="text" id="in-${p.id}" placeholder="Escreva um comentário...">
                        <button onclick="addComment(${p.id})">➤</button>
                    </div>

                    <div class="actions">
                        <button class="btn-small btn-down" onclick="download(${p.id})">Baixar</button>
                        <button class="btn-small btn-del" onclick="deletePost(${p.id})">Excluir</button>
                    </div>
                `;
                feed.appendChild(card);

                // Timer individual
                setInterval(() => {
                    const dist = p.target - new Date().getTime();
                    const el = document.getElementById(`t-${p.id}`);
                    if(!el) return;
                    if(dist < 0) return el.innerText = "CHEGOU! 🎉";
                    
                    const d = Math.floor(dist / 86400000);
                    const h = Math.floor((dist % 86400000) / 3600000);
                    const m = Math.floor((dist % 3600000) / 60000);
                    const s = Math.floor((dist % 60000) / 1000);
                    el.innerText = `${d}d ${h}h ${m}m ${seconds = s < 10 ? '0'+s : s}s`;
                }, 1000);
            });
        }

        // Função de download melhorada (inclui estrutura de imagem e título)
        function download(id) {
            const p = posts.find(x => x.id === id);
            const html = `
            <html><body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;text-align:center">
            <div style="background:url('${p.img}') center/cover;position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.4"></div>
            <div style="position:relative;z-index:2">
                <h1>${p.title}</h1>
                <div id="clock" style="font-size:50px;color:${p.color};font-weight:bold"></div>
            </div>
            <script>
                setInterval(()=>{
                    const d = ${p.target} - Date.now();
                    if(d<0) return document.getElementById('clock').innerText="JÁ CHEGOU!";
                    const h = Math.floor(d/3600000); const m = Math.floor((d%3600000)/60000); const s = Math.floor((d%60000)/1000);
                    document.getElementById('clock').innerText = h + ":" + m + ":" + s;
                },1000);
            <\/script></body></html>`;
            const blob = new Blob([html], {type:'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = p.title + ".html";
            a.click();
        }

        render();
    </script>
</body>
</html>
